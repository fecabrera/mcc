name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pipenv

      - name: Install pipenv
        run: pip install pipenv

      - name: Install dependencies
        run: pipenv sync --dev

      - name: Run tests with coverage
        # COVERAGE_PROCESS_START + the sitecustomize hook on PYTHONPATH make every
        # process record coverage -- the pytest run and the `python -m mcc`
        # subprocesses it spawns (test_cli.py) -- so the driver's CLI/link paths
        # count too. Settings (source, branch, parallel, fail_under) live in
        # .coveragerc; combine merges the per-process data before reporting.
        env:
          COVERAGE_PROCESS_START: ${{ github.workspace }}/.coveragerc
          PYTHONPATH: ${{ github.workspace }}/.github/coverage
        run: |
          pipenv run python -m pytest -v
          pipenv run python -m coverage combine
          echo "# Coverage Report (${{ matrix.os }})" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          pipenv run python -m coverage report --format=markdown >> "$GITHUB_STEP_SUMMARY"

  examples:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pipenv

      - name: Install pipenv
        run: pip install pipenv

      - name: Install dependencies
        run: pipenv sync --dev

      - name: Compile every example
        run: |
          for f in examples/*.mc; do
            echo "== $f =="
            pipenv run python -m mcc "$f" -o "$RUNNER_TEMP/$(basename "$f" .mc)"
          done

      - name: Cross-compile the bare-metal kernel
        run: |
          pipenv run python -m mcc examples/baremetal/kernel.mc \
            --target aarch64-unknown-none-elf -o "$RUNNER_TEMP/kernel.o"

  # The precompiled standard library is experimental: it builds, but linking a
  # program against it is not ready (exported symbols like errno/crc32 collide
  # with system symbols), so the stdlib is compiled from source for now. This
  # job just guards that the precompiled build keeps working. See the roadmap:
  # "Namespaced exported symbols".
  stdlib:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pipenv

      - name: Install pipenv
        run: pip install pipenv

      - name: Install dependencies
        run: pipenv sync --dev

      - name: Build the standard library
        run: pipenv run bash build.sh
