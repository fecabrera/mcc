name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pipenv

      - name: Install pipenv
        run: pip install pipenv

      - name: Install dependencies
        run: pipenv sync --dev

      - name: Run tests with coverage
        # COVERAGE_PROCESS_START + the sitecustomize hook on PYTHONPATH make every
        # process record coverage -- the pytest run and the `python -m mcc`
        # subprocesses it spawns (test_cli.py) -- so the driver's CLI/link paths
        # count too. Settings (source, branch, parallel, fail_under) live in
        # .coveragerc; combine merges the per-process data before reporting.
        env:
          COVERAGE_PROCESS_START: ${{ github.workspace }}/.coveragerc
          PYTHONPATH: ${{ github.workspace }}/.github/coverage
        run: |
          pipenv run python -m pytest -v
          pipenv run python -m coverage combine
          echo "# Coverage Report (${{ matrix.os }})" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          pipenv run python -m coverage report --format=markdown >> "$GITHUB_STEP_SUMMARY"

  examples:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pipenv

      - name: Install pipenv
        run: pip install pipenv

      - name: Install dependencies
        run: pipenv sync --dev

      - name: Compile every example
        # Examples are grouped into topical subdirectories, so recurse. Skip
        # baremetal/ -- it is freestanding and cross-compiled with --target in
        # the next step, not linkable for the host here. Basenames are unique
        # across folders, so the -o output names never collide. -Wall -Werror
        # promotes every opt-in warning class (-Wunchecked-dereference,
        # -Wdead-code, -Wextern-nonnull) to a hard error over the whole
        # example suite, so the examples stay warn-free under everything the
        # compiler can check -- the decided default stays off in normal
        # builds, on in CI.
        #
        # Five demos deliberately keep LIVE triggers to teach their own
        # class, so under -Wall -Werror each is a hard error by design -- a
        # warning-class demo cannot build with its own class promoted to
        # error. They are compiled just below at plain -Werror (their classes
        # off, the documented relaxed default): systems/extern_nonnull.mc,
        # control-flow/dead_code.mc, types/unchecked_dereference.mc,
        # functions/panic_assert.mc (the -Wnoreturn-own demo: its
        # panic(f"...") teaches the diagnosable dying-path leak), and
        # types/destructors.mc (the -Wdestructor-copy demo: its `let view =
        # orig;` teaches the bitwise-copy-of-an-owning-value aliasing hazard).
        #
        # systems/c_struct_abi.mc passes structs by value across the C boundary.
        # The classification is target-specific (AArch64, x86-64 System V, and
        # Win64), so a dedicated step below cross-compiles it to an object for
        # each supported target -- exercising every classifier on every runner
        # -- instead of building it once for the host here.
        run: |
          find examples -name '*.mc' -not -path 'examples/baremetal/*' \
              -not -path 'examples/systems/extern_nonnull.mc' \
              -not -path 'examples/control-flow/dead_code.mc' \
              -not -path 'examples/types/unchecked_dereference.mc' \
              -not -path 'examples/functions/panic_assert.mc' \
              -not -path 'examples/types/destructors.mc' \
              -not -path 'examples/systems/c_struct_abi.mc' | while read -r f; do
            echo "== $f =="
            pipenv run python -m mcc "$f" -Wall -Werror -o "$RUNNER_TEMP/$(basename "$f" .mc)"
          done
          for demo in systems/extern_nonnull control-flow/dead_code \
                      types/unchecked_dereference functions/panic_assert \
                      types/destructors; do
            echo "== examples/$demo.mc (own-class demo: plain -Werror) =="
            pipenv run python -m mcc "examples/$demo.mc" -Werror \
              -o "$RUNNER_TEMP/$(basename "$demo")"
          done

      - name: Cross-compile the bare-metal kernel
        run: |
          pipenv run python -m mcc examples/baremetal/kernel.mc -Wall -Werror \
            --target aarch64-unknown-none-elf -o "$RUNNER_TEMP/kernel.o"

      - name: Cross-compile the C struct-ABI example
        # By-value struct passing is classified per target (AArch64/AAPCS64,
        # x86-64 System V, and Win64), so cross-compile the example to an object
        # for each -- exercising all three classifiers on every runner. The
        # AArch64 and System V forms are additionally link-verified by the round
        # trip in the test suite (on the matching-arch runner); Win64 has no
        # runner, so this object emit is its only end-to-end example coverage.
        run: |
          for triple in aarch64-apple-darwin x86_64-unknown-linux-gnu \
                        x86_64-pc-windows-msvc; do
            echo "== c_struct_abi.mc --target $triple =="
            pipenv run python -m mcc examples/systems/c_struct_abi.mc -Wall -Werror \
              --target "$triple" -o "$RUNNER_TEMP/c_struct_abi-$triple.o"
          done

  # The precompiled standard library is experimental: it builds, but linking a
  # program against it is not ready (exported symbols like errno/crc32 collide
  # with system symbols), so the stdlib is compiled from source for now. This
  # job just guards that the precompiled build keeps working. See the roadmap:
  # "Namespaced exported symbols".
  stdlib:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pipenv

      - name: Install pipenv
        run: pip install pipenv

      - name: Install dependencies
        run: pipenv sync --dev

      - name: Build the standard library
        run: pipenv run bash build.sh

      # Retain the per-platform precompiled library as a downloadable workflow
      # artifact (it is a build product, not checked into the repo). build.sh
      # writes the whole tree -- the static/shared libraries and the std//libc/
      # .mci interface stubs -- under dist/lib.
      - name: Upload the precompiled library
        uses: actions/upload-artifact@v4
        with:
          name: libmc-${{ matrix.os }}
          path: dist/lib

  # Install the wheel exactly as a user (or the Homebrew formula) does and
  # smoke-test it, so a packaging slip -- a renamed stdlib directory, a missing
  # subpackage -- fails here instead of after a release tag is cut.
  package:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      # Build the wheel once, then install that exact file -- so the artifact
      # uploaded below is the very thing the smoke test exercises.
      - name: Build the wheel
        run: pip wheel . --no-deps -w dist

      - name: Install the wheel
        run: pip install dist/*.whl

      # Compile from a directory other than the repo root, so `import "std/io"`
      # can only resolve through the *bundled* stdlib (mcc/lib inside the
      # install), never the repo's own lib/ tree.
      - name: Smoke-test the installed compiler
        run: |
          tmp="$(mktemp -d)"
          cat > "$tmp/hi.mc" <<'MC'
          import "std/io";
          fn main() -> int32 { println("packaged ok: {}".format(30)); return 0; }
          MC
          cd "$tmp"
          mcc hi.mc -Wall -Werror --run          # JIT: exercises codegen + the bundled stdlib
          mcc hi.mc -Wall -Werror -o hi && ./hi  # native: object emission + linking

      # The wheel is pure Python (py3-none-any), identical on every runner, so
      # publish it once -- from Linux -- to avoid a duplicate-name upload.
      - name: Upload the wheel
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: mcc-wheel
          path: dist/*.whl
